function AuraGiftCards() {
  const [page, setPage] = React.useState('home');
  const [cart, setCart] = React.useState(() => {
    try {
      const saved = localStorage.getItem('aura_cart');
      return saved ? JSON.parse(saved) : [];
    } catch { return []; }
  });
  const [showCart, setShowCart] = React.useState(false);
  const [showLogin, setShowLogin] = React.useState(false);
  const [recoveryToken, setRecoveryToken] = React.useState(null);
  const [cartBump, setCartBump] = React.useState(false);
  const auth = useAuth();
  
  React.useEffect(() => {
    // Detect Supabase recovery hash
    const hash = window.location.hash;
    if (hash && hash.includes('type=recovery')) {
      const params = new URLSearchParams(hash.substring(1));
      const token = params.get('access_token');
      if (token) {
        setRecoveryToken(token);
        window.location.hash = ''; // Clear hash from URL
      }
    }

    // Detect payment success (hash or search params)
    const hashParams = window.location.hash;
    const searchParams = new URLSearchParams(window.location.search);
    
    let oid = null;
    if (hashParams.startsWith('#success_')) {
      oid = hashParams.replace('#success_', '');
    } else if (searchParams.get('payment') === 'success') {
      oid = searchParams.get('order_id') || searchParams.get('amp;order_id');
    }

    if (oid) {
      localStorage.setItem('last_order_id', oid);
      
      // Auto-validate order (Netflix accounts will be instantly assigned from stock)
      fetch(API_BASE + '/validate-order?id=' + oid).catch(e => console.error(e));

      setPage('orders');
      window.dispatchEvent(new Event('refresh_orders'));
      setTimeout(() => window.dispatchEvent(new Event('refresh_orders')), 3500);
      
      // Show payment success toast
      setTimeout(() => {
        window.showToast('Paiement confirmé ! Merci pour votre achat. Vos identifiants sont disponibles ci-dessous.', 'success');
      }, 500);
      
      try {
        const cartTotal = cart.reduce((sum, item) => sum + item.price, 0);
        if (window.fbq) window.fbq('track', 'Purchase', { value: cartTotal, currency: 'DZD' });
      } catch(e) {}
      setCart([]);
      
      // Clean up URL
      const newUrl = window.location.protocol + "//" + window.location.host + window.location.pathname;
      window.history.replaceState({path:newUrl},'',newUrl);
    }
  }, []);

  const initialMount = React.useRef(true);

  // Sync cart from Supabase on login if local cart is empty
  React.useEffect(() => {
    if (auth.user && auth.user.user_metadata?.cart && cart.length === 0) {
      setCart(auth.user.user_metadata.cart);
    }
  }, [auth.user]);

  // Sync cart to local storage on changes
  React.useEffect(() => {
    localStorage.setItem('aura_cart', JSON.stringify(cart));
    initialMount.current = false;
  }, [cart]);

  // Re-run scroll animations every time the page changes
  useScrollReveal([page]);

  const addToCart = (card) => {
    setCart([...cart, card]);
    try {
      if (window.fbq) window.fbq('track', 'AddToCart', { content_name: card.type + ' ' + card.duration, value: card.price, currency: 'DZD' });
    } catch(e) {}
    setCartBump(true);
    setTimeout(() => setCartBump(false), 400);
  };

  const removeFromCart = (index) => {
    setCart(cart.filter((_, i) => i !== index));
  };

  const handleNavigate = (p) => {
    setPage(p);
    if (p === 'orders') window.dispatchEvent(new Event('refresh_orders'));
    window.scrollTo({ top: 0, behavior: 'smooth' });
  };

  const handleCheckout = () => {
    setShowCart(false);
    if (!auth.user) {
      setShowLogin(true);
    } else {
      setPage('checkout');
    }
  };

  const handleLoginSuccess = () => {
    setShowLogin(false);
    if (cart.length > 0) {
      setPage('checkout');
    }
  };

  return (
    <div>
      {auth.user && ["nassym.yak@gmail.com", "admin@aura-stream.com", "vompiroman@gmail.com"].includes(auth.user.email) && (
        <button onClick={async () => {
          try {
            const t = auth.token || localStorage.getItem('token');
            if(!t) { alert("Token manquant !"); return; }
            alert("Génération de la commande en cours...");
            const res = await fetch(API_BASE+'/create-order', {
               method: 'POST',
               headers: {'Content-Type': 'application/json', 'Authorization': 'Bearer '+t},
               body: JSON.stringify({
                  amount: 1500,
                  items: [
                    {name: 'Netflix 1 mois', price: 1500, quantity: 1}
                  ]
               })
            });
            if(res.ok) {
              const data = await res.json();
              // Auto-validate for testing
              await fetch(API_BASE + '/validate-order?id=' + data.order_id);
              
              setPage('orders'); window.dispatchEvent(new Event('refresh_orders'));
            } else {
              const data = await res.json();
              alert("❌ Erreur serveur : " + (data.error || "Inconnue"));
            }
          } catch(e) { alert("❌ Erreur: "+e.message); }
        }} style={{position:'fixed', bottom:'80px', left:'20px', zIndex:9999, background:'var(--spotify)', color:'#000', padding:'12px 24px', borderRadius:'8px', fontWeight:700, cursor:'pointer', border:'none', boxShadow:'0 4px 12px rgba(29,185,84,0.3)'}}>
          🪄 Générer une commande Test (Admin)
        </button>
      )}

      <TopBanner />
      <Header
        cartCount={cart.length}
        cartBump={cartBump}
        onCartClick={() => setShowCart(true)}
        onNavigate={handleNavigate}
        auth={auth}
        onLoginClick={() => setShowLogin(true)}
      />

      <main>
        {page === 'home' && (
          <>
            <HeroSection onShopClick={() => handleNavigate('shop')} />
            <ProductsSection onAddToCart={addToCart} />
            <FAQSection />
            <SocialProofSection />
          </>
        )}

        {page === 'shop' && (
          <ProductsSection onAddToCart={addToCart} />
        )}

        {page === 'checkout' && auth.user && (
          <div className="section">
            <CheckoutPage
              cart={cart}
              email={auth.user.email}
              onSuccess={() => { setCart([]); handleNavigate('success'); }}
              onBack={() => handleNavigate('shop')}
            />
          </div>
        )}

        {page === 'success' && (
          <div className="section">
            <SuccessPage onNavigate={handleNavigate} />
          </div>
        )}

        {page === 'profile' && auth.user && (
          <div className="section">
            <ProfilePage auth={auth} />
          </div>
        )}

        {page === 'orders' && auth.user && (
          <div className="section">
            <OrdersPage auth={auth} />
          </div>
        )}

        {page === 'legal' && (
          <div className="section">
            <LegalPage />
          </div>
        )}

        {page === 'admin' && auth.user && (
          <div className="section">
            <AdminDashboard auth={auth} />
          </div>
        )}
      </main>

      <Footer onNavigate={handleNavigate} />
      <WhatsAppFloat />

      {showCart && (
        <CartSidebar
          cart={cart}
          onRemove={removeFromCart}
          onClose={() => setShowCart(false)}
          onCheckout={handleCheckout}
        />
      )}

      {showLogin && (
        <LoginModal
          auth={auth}
          onClose={() => setShowLogin(false)}
          onSuccess={handleLoginSuccess}
        />
      )}

      {recoveryToken && (
        <ResetPasswordModal
          auth={auth}
          recoveryToken={recoveryToken}
          onClose={() => setRecoveryToken(null)}
        />
      )}



      <ToastContainer />
    </div>
  );
}

function ResetPasswordModal({ auth, recoveryToken, onClose }) {
  const { t } = useLanguage();
  const [password, setPassword] = React.useState('');
  const [confirmPassword, setConfirmPassword] = React.useState('');
  const [loading, setLoading] = React.useState(false);
  const [error, setError] = React.useState('');
  const [success, setSuccess] = React.useState(false);

  const handleSubmit = async (e) => {
    e.preventDefault();
    if (password !== confirmPassword) {
      setError('Les mots de passe ne correspondent pas.');
      return;
    }
    setLoading(true);
    setError('');
    const res = await auth.resetPassword(recoveryToken, password);
    if (res.success) {
      setSuccess(true);
    } else {
      setError(t(res.error));
    }
    setLoading(false);
  };

  return (
    <div className="modal-overlay">
      <div className="modal">
        {!success && <button className="modal-close" onClick={onClose}>&times;</button>}
        <h2>{t('resetTitle')}</h2>
        {success ? (
          <div style={{textAlign: 'center'}}>
            <p style={{color: 'var(--green-whatsapp)', marginBottom: '1.5rem'}}>{t('resetSuccess')}</p>
            <button className="form-submit" onClick={onClose}>{t('close')}</button>
          </div>
        ) : (
          <form onSubmit={handleSubmit}>
            <input className="form-input" type="password" placeholder={t('newPass')} value={password} onChange={e => setPassword(e.target.value)} required />
            <input className="form-input" type="password" placeholder={t('confirmPass')} value={confirmPassword} onChange={e => setConfirmPassword(e.target.value)} required />
            {error && <p className="form-error">{error}</p>}
            <button className="form-submit" type="submit" disabled={loading}>
              {loading ? t('loading') : t('validateNewPass')}
            </button>
          </form>
        )}
      </div>
    </div>
  );
}

  );
